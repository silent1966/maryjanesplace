# Netlify build & deployment config for Mary Jane's Place

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force the canonical domain: .co.uk is primary; the .uk variant 301-redirects to it.
[[redirects]]
  from = "https://maryjanesplace.uk/*"
  to   = "https://maryjanesplace.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.maryjanesplace.uk/*"
  to   = "https://maryjanesplace.co.uk/:splat"
  status = 301
  force = true

# www.co.uk → apex .co.uk (single canonical host)
[[redirects]]
  from = "https://www.maryjanesplace.co.uk/*"
  to   = "https://maryjanesplace.co.uk/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Long-cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
