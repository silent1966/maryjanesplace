backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://maryjanesplace.co.uk
display_url: https://maryjanesplace.co.uk
logo_url: https://maryjanesplace.co.uk/logo.png

collections:
  # SITE-WIDE SETTINGS — single source of truth for brand, contact, hours, perks
  - name: "site"
    label: "Site settings"
    delete: false
    editor:
      preview: false
    files:
      - file: "src/content/site/settings.json"
        label: "Brand, contact, hours, member perks, partners"
        name: "settings"
        fields:
          - label: "Brand"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Name",          name: "name",         widget: "string" }
              - { label: "Tagline",       name: "tagline",      widget: "string" }
              - { label: "Short tagline", name: "shortTagline", widget: "string" }
              - { label: "Location",      name: "location",     widget: "string" }
              - { label: "National line", name: "national",     widget: "string" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - label: "Address"
                name: "address"
                widget: "object"
                fields:
                  - { label: "Street",    name: "line1",    widget: "string" }
                  - { label: "City",      name: "city",     widget: "string" }
                  - { label: "Postcode",  name: "postcode", widget: "string" }
                  - { label: "Country",   name: "country",  widget: "string" }
                  - { label: "Latitude",  name: "lat",      widget: "number", value_type: "float" }
                  - { label: "Longitude", name: "lng",      widget: "number", value_type: "float" }
              - { label: "Phone (display)",        name: "phone",         widget: "string" }
              - { label: "Phone (international)",  name: "phoneIntl",     widget: "string" }
              - { label: "Email",                  name: "email",         widget: "string" }
              - { label: "Google Maps URL",        name: "googleMapsUrl", widget: "string" }
          - label: "Social"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram URL",  name: "instagram",  widget: "string" }
              - { label: "Facebook URL",   name: "facebook",   widget: "string" }
              - { label: "Google Maps",    name: "googleMaps", widget: "string" }
          - label: "Opening hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Day",      name: "day",      widget: "string" }
              - { label: "Sessions", name: "sessions", widget: "string" }
              - { label: "Closed",   name: "closed",   widget: "boolean", required: false, default: false }
          - label: "Headline facts (stats band)"
            name: "facts"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Member perks"
            name: "memberPerks"
            widget: "list"
            fields:
              - { label: "Icon (vape / tag / star / people / calendar / mail)", name: "icon",  widget: "select", options: ["vape", "tag", "star", "people", "calendar", "mail"] }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body",  name: "body",  widget: "text" }
          - label: "Partner categories"
            name: "partnerCategories"
            widget: "list"
            fields:
              - { label: "ID (lowercase)", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Blurb", name: "blurb", widget: "text" }
              - { label: "What we're interested in", name: "interestedIn", widget: "text" }

  # SHOP PRODUCTS — full e-commerce editing without GitHub
  - name: "products"
    label: "Shop · Products"
    folder: "src/content/products"
    extension: "json"
    format: "json"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}} — £{{price}} ({{category}})"
    fields:
      - { label: "Name",        name: "name",        widget: "string" }
      - { label: "Brand",       name: "brand",       widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Portable vapes",      value: "portable-vapes" }
          - { label: "Desktop vapes",       value: "desktop-vapes" }
          - { label: "Pen vapes",           value: "pen-vapes" }
          - { label: "Dab pens",            value: "dab-pens" }
          - { label: "510 batteries",       value: "cartridge-batteries" }
          - { label: "Concentrate rigs",    value: "dab-rigs" }
          - { label: "Grinders",            value: "grinders" }
          - { label: "Storage",             value: "storage" }
          - { label: "Cleaning",            value: "cleaning" }
          - { label: "Accessories",         value: "accessories" }
          - { label: "Batteries",           value: "batteries" }
          - { label: "Cases",               value: "cases" }
      - { label: "Price (£)",         name: "price",       widget: "number", value_type: "float" }
      - { label: "Sale price (£) — leave blank if not on sale", name: "salePrice", widget: "number", value_type: "float", required: false }
      - { label: "Image (URL or upload)", name: "image",   widget: "image", required: true, default: "/products/placeholder.svg" }
      - { label: "Gallery images",        name: "gallery", widget: "list",  required: false, field: { label: "Image", name: "image", widget: "image" } }
      - { label: "Short summary (1 sentence)", name: "summary",     widget: "text" }
      - { label: "Full description",      name: "description", widget: "text" }
      - label: "Specifications"
        name: "specs"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }
      - { label: "In stock?",  name: "inStock",  widget: "boolean", default: true }
      - { label: "Featured?",  name: "featured", widget: "boolean", default: false }
      - { label: "Tags",       name: "tags",     widget: "list", required: false, field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Stripe Payment Link URL (leave empty to use enquiry form)", name: "stripeLink", widget: "string", required: false, default: "" }
      - { label: "Retail North SKU (internal)", name: "rnSku", widget: "string", required: false }
      - { label: "Display order (lower = first)", name: "order", widget: "number", value_type: "int", default: 999 }

  # BLOG POSTS — content editing without GitHub
  - name: "posts"
    label: "Blog · Posts"
    folder: "src/content/posts"
    extension: "md"
    format: "frontmatter"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Title",   name: "title",   widget: "string" }
      - { label: "Date",    name: "date",    widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Draft",   name: "draft",   widget: "boolean", default: false }
      - { label: "Body",    name: "body",    widget: "markdown" }
